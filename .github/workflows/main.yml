name: Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false

jobs:
    build-windows:
      runs-on: windows-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Download Love2D
          shell: bash
          run: |
            curl -fsSL -o love.zip "https://github.com/love2d/love/releases/download/11.5/love-11.5-win64.zip"
            unzip love.zip

        - name: Install zip
          run: choco install zip --no-progress -y

        - name: Build executable
          shell: bash
          run: LOVE_PATH="love-11.5-win64" bash build.sh

        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: AresRPG-Windows
            path: dist/

    build-linux:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Install dependencies
          run: sudo apt-get update && sudo apt-get install -y love zip

        - name: Build executable
          run: bash build.sh

        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: AresRPG-Linux
            path: dist/AresRPG

    build-macos:
        runs-on: macos-latest

        steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Download Love2D
          run: |
            curl -fsSL -o love-macos.zip "https://github.com/love2d/love/releases/download/11.5/love-11.5-macos.zip"
            unzip love-macos.zip

        - name: Build executable
          run: LOVE_PATH=love.app bash build.sh

        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: AresRPG-macOS
            path: dist/

    release:
        runs-on: ubuntu-latest
        needs: [ build-windows, build-linux, build-macos ]
        permissions:
          contents: write

        steps:
        - name: Checkout repository
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Generate changelog
          id: changelog
          run: |
            echo 'commits<<EOF' >> $GITHUB_OUTPUT
            git log --no-merges --pretty=format:'- %s' ${{ github.event.before }}...${{ github.sha }} >> $GITHUB_OUTPUT
            echo '' >> $GITHUB_OUTPUT
            echo 'EOF' >> $GITHUB_OUTPUT

        - name: Download Windows artifact
          uses: actions/download-artifact@v4
          with:
            name: AresRPG-Windows
            path: artifacts/windows

        - name: Download Linux artifact
          uses: actions/download-artifact@v4
          with:
            name: AresRPG-Linux
            path: artifacts/linux

        - name: Download MacOS artifact
          uses: actions/download-artifact@v4
          with:
            name: AresRPG-macOS
            path: artifacts/macos

        - name: Package artifacts
          run: |
            cd artifacts/windows && zip -r ../../AresRPG-Windows.zip . && cd ../..
            cp artifacts/linux/AresRPG AresRPG-Linux && chmod +x AresRPG-Linux
            cd artifacts/macos && zip -r ../../AresRPG-MacOS.zip AresRPG.app && cd ../..

        - name: Create release
          uses: softprops/action-gh-release@v2
          with:
            tag_name: release-${{ github.run_number }}
            name: "Release ${{ github.run_number }}"
            prerelease: ${{ github.event.inputs.prerelease == 'true' }}
            body: |
                ## Ares RPG - Version: ${{ github.run_number }}

                > [!WARNING]
                > This is an in development release, it is not in a complete state, there may be bugs or missing features

                ## Changelog

                ${{ steps.changelog.outputs.commits }}

                **Commit:** ${{ github.sha }}
            files: |
                AresRPG-Windows.zip
                AresRPG-Linux
                AresRPG-MacOS.zip