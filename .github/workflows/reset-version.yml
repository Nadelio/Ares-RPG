name: Reset Version Counter

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    permissions:
      actions: write

    steps:
      - name: Set version offset
        run: |
          # Setting the offset to the current run_number means the next
          # build will produce effective version 1 (next_run - offset = 1).
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/RUN_NUMBER_OFFSET" \
            -d "{\"name\":\"RUN_NUMBER_OFFSET\",\"value\":\"${{ github.run_number }}\"}")

          if [ "$STATUS" = "404" ]; then
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/variables" \
              -d "{\"name\":\"RUN_NUMBER_OFFSET\",\"value\":\"${{ github.run_number }}\"}"
            echo "Created RUN_NUMBER_OFFSET=${{ github.run_number }}"
          else
            echo "Updated RUN_NUMBER_OFFSET=${{ github.run_number }}"
          fi
